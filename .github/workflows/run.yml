name: FastAPI Workflow Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn

      - name: Run FastAPI app (test start)
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          echo "Server started successfully (test mode)"
